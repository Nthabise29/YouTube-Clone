<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Sign in - Nthabi's YT clone</title>
</head>
<body>

<button class="dark-mode-toggle" onclick="document.body.classList.toggle('dark-mode')">🌙</button>

<div class="login-page">
    <div class="login-card">
        <a href="./index.html" class="login-logo">
            <img src="https://www.vectorlogo.zone/logos/youtube/youtube-ar21.svg" alt="YouTube">
        </a>

        <h1>Sign in</h1>
        <p class="login-subtitle">to continue to Nthabi's YT clone</p>

        <form class="login-form" id="login-form">
            <div class="form-group">
                <label for="email">Email or phone</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <p class="login-forgot">
                <a href="#">Forgot password?</a>
            </p>

            <div class="login-actions">
                <a href="./index.html" class="login-link">Create account</a>
                <button type="submit" class="login-btn">Next</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        window.location.href = './index.html';
    });
</script>

</body>
</html>
